<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パーキングアプリ - 新規登録</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="status-bar">
        <div class="status-left">
            <span class="signal-icon">📶</span>
            <span>9:41</span>
        </div>
        <div class="status-right">
            <span class="battery-icon">🔋 100%</span>
        </div>
    </div>
    
    <div class="language-selector" id="language-toggle">
        <span class="jp">日本語</span>
        <span class="en">/ EN</span>
    </div>
    
    <!-- REGISTER SCREEN -->
    <div class="screen">
        <div class="form-container">
            <div class="back-button" id="back-to-login">
                <span class="back-arrow">←</span>
                <span data-ja="ログインに戻る" data-en="Back to login">ログインに戻る</span>
            </div>
            
            <div class="app-title">
                <div class="app-name" data-ja="新規登録" data-en="Sign Up">新規登録</div>
                <div class="app-tagline" data-ja="アカウントを作成する" data-en="Create your account">アカウントを作成する</div>
            </div>
            
            <div class="form-group">
                <div class="input-field">
                    <div class="input-label" data-ja="メールアドレス" data-en="Email">メールアドレス</div>
                    <div class="input-value">example@email.com</div>
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-field">
                    <div class="input-label" data-ja="電話番号" data-en="Phone Number">電話番号</div>
                    <div class="input-value">090-1234-5678</div>
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-field">
                    <div class="input-label" data-ja="パスワード" data-en="Password">パスワード</div>
                    <div class="input-value">••••••••</div>
                    <div class="password-toggle">👁</div>
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-field">
                    <div class="input-label" data-ja="パスワード確認" data-en="Confirm Password">パスワード確認</div>
                    <div class="input-value">••••••••</div>
                    <div class="password-toggle">👁</div>
                </div>
            </div>
            
            <button class="primary-button register-button" id="show-verification" data-ja="アカウント作成" data-en="Create Account">
                アカウント作成
                <div class="ripple"></div>
            </button>
            
            <div class="separator">
                <div class="separator-line"></div>
                <div class="separator-text" data-ja="または" data-en="Or">または</div>
                <div class="separator-line"></div>
            </div>
            
            <div class="social-login">
                <button class="social-button">
                    <div class="social-icon google-icon">G</div>
                    <div class="social-text" data-ja="Googleで登録" data-en="Sign up with Google">Googleで登録</div>
                </button>
            </div>
            
            <div class="social-login">
                <button class="social-button">
                    <div class="social-icon apple-icon">A</div>
                    <div class="social-text" data-ja="Appleで登録" data-en="Sign up with Apple">Appleで登録</div>
                </button>
            </div>
            
            <div class="account-toggle">
                <div class="account-toggle-text" data-ja="すでにアカウントをお持ちですか？" data-en="Already have an account?">すでにアカウントをお持ちですか？</div>
                <a class="account-toggle-link" id="show-login" data-ja="ログイン" data-en="Log in">ログイン</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
